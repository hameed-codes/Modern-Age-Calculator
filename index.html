<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="age-cal">
        <!-- Age Calculator -->
        <h1>Age <span>Calculator</span></h1>
        <p>Select your Date of Birth</p>

        <!-- Date Input -->
        <input type="date" id="birthdate">
        <button id="cal-btn">Calculate Now</button>

        <!-- Result Display -->
        <div class="result">
            <div class="result-box">
                <p id="years">--</p>
                <p>Years</p>
            </div>
            <div class="result-box">
                <p id="months">--</p>
                <p>Months</p>
            </div>
            <div class="result-box">
                <p id="days">--</p>
                <p>Days</p>
            </div>
        </div>
        <p class="credit">Made By Hameed Khan</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
